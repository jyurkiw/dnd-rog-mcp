services:
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      neo4j:
        condition: service_healthy
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  neo4j_data:
