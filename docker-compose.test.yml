# Run with:
#   ./run-tests.sh                  (recommended — auto-cleans up)
#   docker compose -f docker-compose.test.yml up --abort-on-container-exit
#
# --abort-on-container-exit stops all containers when the test runner exits.
# The exit code of `docker compose up` matches the test runner's exit code.
#
# pull_policy: build on the test-runner service means the image is always
# rebuilt from source — no need to pass --build on the command line.

services:
  neo4j-test:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/test-password
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "test-password", "RETURN 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    # No external ports -- internal network only
    # No named volume -- data is intentionally ephemeral

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    pull_policy: build
    environment:
      NEO4J_URI: bolt://neo4j-test:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: test-password
      NEO4J_DATABASE: neo4j
      ALLOW_TRUE_DELETE: "true"
    depends_on:
      neo4j-test:
        condition: service_healthy
    restart: "no"
    command: ["pytest", "--verbosity=3"]
